<section class="top-bar">
    <div class="title">Choose Your Game</div>
    <div>Username/Guest</div>
</section>

<section class="card-container">
    @for(game of games; track game.id) {
        <div class="card">
            <h2>{{ game.name }}</h2>
            <p>{{ game.description }}</p>
            <div class="details-box">
                <div class="detail"><i class="fa-solid fa-users"></i> {{game.player}}</div>
                <div class="detail"><i class="fa-solid fa-clock"></i> {{game.duration}}</div>
            </div>
        </div>
    }
</section>

<section class="bottom-bar">
    <input type="text" value="room code">
    <button>Join Room</button>
</section>
