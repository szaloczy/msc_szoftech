<div class="container-fluid">
    <div class="row">
        <div class="col-10">
            <div class="row justify-content-start">
                @for (key of gameKeys; track key) {
                    <div class="col-3 card ms-5" (click)="selectGame(key)">
                        <div class="row">
                            <h2>{{ getGameDetails(key).title }}</h2>
                        </div>
                        <div class="row">
                            <div class="col-12">
                                <i class="fa-solid fa-users"></i> {{ getGameDetails(key).players }}
                            </div>
                            <div class="col-12">
                                <i class="fa-solid fa-clock"></i> {{ getGameDetails(key).estimatedTime }}
                            </div>
                        </div>

                    </div>
                }
            </div>
        </div>
        <div class="col-2">
            @if (selectedGameKey !='') {
                <div class="card p-3">
                    <div class="row">
                        <div class="col-12 text-center">
                            <h1>{{ getGameDetails(selectedGameKey).title }}</h1>
                        </div>
                    </div>
                    <p class="mt-3">{{ getGameDetails(selectedGameKey).description }}</p>
                    <button class="btn btn-primary mt-3" (click)="createRoom()">create room</button>
                </div>
            }@else {
                <div class="card p-3 text-center">
                    <h2>Choose a Game</h2>
                </div>
            }

        </div>
    </div>
</div>
